spring:
  application:
    name: bookvillage-mock
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3407/bookvillage_mock?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 86400
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true
  error:
    include-message: always
    include-stacktrace: always
    include-exception: true
    include-binding-errors: always
  tomcat:
    accesslog:
      enabled: true

file:
  storage-path: ./uploads/receipts
  base-path: ./uploads
  lab-upload-path: ./uploads/lab
  product-image-path: ./uploads/admin-products

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:local-dummy-key}
      secret-key: ${AWS_SECRET_KEY:local-dummy-secret}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:local-dummy-bucket}
    stack:
      auto: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  expiration: 315360000


